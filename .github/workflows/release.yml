name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build:plugin

      - name: Validate plugin.json
        run: node -e "JSON.parse(require('fs').readFileSync('plugin/.claude-plugin/plugin.json','utf-8'))"

      - name: Validate marketplace.json
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf-8'))"

      - name: Verify bundled MCP server exists
        run: test -f plugin/mcp/server.js

      - name: Create plugin tarball
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          tar -czf diverger-claude-plugin-${TAG}.tar.gz plugin/

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: diverger-claude-plugin-*.tar.gz
